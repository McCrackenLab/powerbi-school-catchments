name: Inspect Scotland Secondary Non-Denominational Catchments

on:
  workflow_dispatch:
  push:
    paths:
      - "incoming/scotland-secondary-non-denom/**"
      - "scripts/inspect_shapefile_schema.py"
      - ".github/workflows/inspect_scotland_sn_catchments.yml"

permissions:
  contents: write

jobs:
  inspect-shapefile:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pyshp pandas

      - name: Inspect shapefile schema
        run: |
          python scripts/inspect_shapefile_schema.py \
            --input-dir incoming/scotland-secondary-non-denom \
            --basename non_denom_pub_schlsn \
            --output-dir outputs/scotland-secondary-non-denom-schema

      - name: Commit inspection outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/scotland-secondary-non-denom-schema
          git diff --cached --quiet || git commit -m "Inspect Scotland secondary non-denominational catchment shapefile"
          git push
