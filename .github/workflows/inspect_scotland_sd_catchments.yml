name: Inspect Scotland Secondary Denominational Catchments

on:
  workflow_dispatch:
  push:
    paths:
      - "incoming/scotland-secondary-denom/**"
      - "scripts/inspect_shapefile_schema.py"
      - ".github/workflows/inspect_scotland_sd_catchments.yml"

permissions:
  contents: write

jobs:
  inspect-shapefile:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Show repository state
        run: |
          echo "Current branch:"
          git branch --show-current
          echo ""
          echo "Current commit:"
          git rev-parse HEAD
          echo ""
          echo "Incoming denominational shapefile files:"
          ls -la incoming/scotland-secondary-denom || true
          echo ""
          echo "Inspection script check:"
          ls -la scripts/inspect_shapefile_schema.py || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pyshp pandas

      - name: Inspect denominational shapefile schema
        run: |
          python scripts/inspect_shapefile_schema.py \
            --input-dir incoming/scotland-secondary-denom \
            --basename denom_pub_schlsd \
            --output-dir outputs/scotland-secondary-denom-schema

      - name: Show generated schema report
        run: |
          echo ""
          echo "Generated schema report:"
          cat outputs/scotland-secondary-denom-schema/schema_report.md || true
          echo ""
          echo "Generated candidate field summary:"
          cat outputs/scotland-secondary-denom-schema/candidate_field_distinct_summary.csv || true
          echo ""
          echo "Git status:"
          git status --short

      - name: Commit inspection outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/scotland-secondary-denom-schema
          git status --short
          git diff --cached --quiet || git commit -m "Inspect Scotland secondary denominational catchment shapefile"
          git push
