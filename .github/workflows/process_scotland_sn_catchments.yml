name: Process Scotland Secondary Non-Denominational Catchments

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-catchments:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pyshp pandas pyproj

      - name: Process shapefile into split GeoJSON and lookup
        run: |
          python scripts/process_scotland_sn_catchments.py \
            --input-dir incoming/scotland-secondary-non-denom \
            --basename non_denom_pub_schlsn \
            --schools-csv inputs/scottish_secondary_schools_for_mapping.csv \
            --lookup-csv inputs/school_reference_layer_lookup_with_fallback_and_fife_catchments.csv \
            --geojson-output-dir scotland-secondary-non-denom-catchments \
            --outputs-dir outputs/scotland-secondary-non-denom \
            --github-raw-base-url https://raw.githubusercontent.com/McCrackenLab/powerbi-school-catchments/refs/heads/main/scotland-secondary-non-denom-catchments/

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scotland-secondary-non-denom-catchments outputs/scotland-secondary-non-denom
          git diff --cached --quiet || git commit -m "Process Scotland secondary non-denominational catchments"
          git push
